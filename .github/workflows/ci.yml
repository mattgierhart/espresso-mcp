name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist artifact starts with shebang
        run: |
          head -n 1 dist/index.js | grep -q '^#!/usr/bin/env node' \
            || (echo "dist/index.js missing shebang" && exit 1)

      - name: Verify package contents (dry run)
        if: matrix.node-version == '22.x'
        run: npm pack --dry-run
